#:schema https://dystroy.org/bacon/.bacon.schema.json

# Bacon overlay config.
# Use with:
#   bacon <job> --config-toml "$(cat bacon-check.toml)"
#
# This only overrides the locations export path so multiple Bacon
# processes do not overwrite each other's diagnostics.

[jobs.check]
command = ["cargo", "check", "--all-targets"]
need_stdout = false

[exports.locations]
auto = true
exporter = "locations"
path = ".bacon-check-locations"
line_format = "idx={item-idx}|:|kind={kind}|:|job={job}|:|file={path}|:|line={line}|:|col={column}|:|message={message}|:|context={context}"
